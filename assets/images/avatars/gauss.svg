<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a1628"/><stop offset="100%" stop-color="#1a2744"/></linearGradient></defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Face -->
  <circle cx="100" cy="90" r="36" fill="#f5d0a9"/>
  <!-- 18th century wig -->
  <path d="M62 85 Q58 55 80 46 Q90 42 100 44 Q110 42 120 46 Q142 55 138 85" fill="#e8e8e8"/>
  <path d="M62 85 Q56 100 58 115 Q60 105 66 95" fill="#e8e8e8"/>
