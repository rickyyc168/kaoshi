  <text x="145" y="60" fill="#f0932b" font-size="14" opacity="0.5" font-family="serif">∫</text>
  <text x="42" y="120" fill="#ffd700" font-size="12" opacity="0.4" font-family="serif">π</text>
  <text x="152" y="115" fill="#ee5a24" font-size="14" opacity="0.5" font-family="serif">∞</text>
  <!-- Collar -->
