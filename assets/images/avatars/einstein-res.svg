<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3483;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A569BD;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="95" r="70"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="200" height="240" rx="16" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="30" cy="30" r="25" fill="rgba(255,255,255,0.06)"/>
  <circle cx="170" cy="200" r="35" fill="rgba(255,255,255,0.04)"/>
  <!-- Avatar circle -->
  <circle cx="100" cy="95" r="72" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <circle cx="100" cy="95" r="70" fill="rgba(255,255,255,0.1)"/>
  <!-- Emoji -->
  <text x="100" y="115" text-anchor="middle" font-size="64">🔬</text>
  <!-- Name -->
  <text x="100" y="190" text-anchor="middle" fill="white" font-size="24" font-weight="800" font-family="sans-serif">爱因斯坦</text>
  <!-- Subtitle -->
  <text x="100" y="215" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="sans-serif">Albert Einstein (Research)</text>
  <!-- Bottom accent -->
  <rect x="60" y="225" width="80" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
</svg>